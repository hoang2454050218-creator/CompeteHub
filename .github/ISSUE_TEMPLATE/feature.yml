name: Feature request
description: Suggest a new capability for CompeteHub
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain or limitation is this solving?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Backend API
        - Worker scoring
        - Frontend UX
        - Infrastructure
        - Cross-cutting
    validations:
      required: true
