name: Bug report
description: Report a defect in CompeteHub
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the issue
      placeholder: |
        1. Log in as participant
        2. Open competition X
        3. Submit CSV with ID column missing
        4. Observe 500 instead of 400
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour

  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - backend
        - frontend
        - worker
        - infrastructure (nginx / docker)
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit SHA / version

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traces
      render: shell
