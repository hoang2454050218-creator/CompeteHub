version: 2
updates:
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      prod-deps:
        applies-to: version-updates
        dependency-type: production
      dev-deps:
        applies-to: version-updates
        dependency-type: development
    labels:
      - dependencies
      - backend

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      prod-deps:
        applies-to: version-updates
        dependency-type: production
      dev-deps:
        applies-to: version-updates
        dependency-type: development
    labels:
      - dependencies
      - frontend

  - package-ecosystem: npm
    directory: /worker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - worker

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /worker
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker
