server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # AUDIT-FIX M-08: Security headers owned by outer nginx (nginx/nginx.conf)
    # to avoid double-header issues (browser uses first occurrence).
    # Inner nginx (this file) only serves static and proxies WS upgrades.

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
}
