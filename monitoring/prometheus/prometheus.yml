global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: competehub
    env: production

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: backend
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['backend:3000']
    bearer_token_file: /etc/prometheus/metrics_token
    relabel_configs:
      - target_label: service
        replacement: backend

  - job_name: worker
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ['worker:3001']
    relabel_configs:
      - target_label: service
        replacement: worker

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
